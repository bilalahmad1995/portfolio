  <body>
    <form name="blog-newsletter" data-netlify="true" netlify-honeypot="bot-field" hidden>

    <form name="blog-feedback" data-netlify="true" netlify-honeypot="bot-field" hidden>

    </form>
    <form name="contact-message" data-netlify="true" netlify-honeypot="bot-field" hidden>

      <input type="email" name="email" />
      <textarea name="message"></textarea>

    </form>
